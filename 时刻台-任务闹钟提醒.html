<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>时刻台 · 关键事务提醒</title>
<script>
  /* 提前设置主题，避免刷新闪烁 */
  (function(){try{var t=localStorage.getItem("shiketai.theme");if(!t)t=window.matchMedia&&matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t);}catch(e){}})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F7FE; --surface:#FFFFFF; --surface-2:#FAFBFF;
    --ink:#101A3D; --ink-soft:#5A668C; --ink-faint:#9AA4C2;
    --line:#E4EAF7; --line-strong:#D4DCF0;
    --blue:#2F5BEA; --blue-deep:#1B3BB5; --blue-soft:#EAF0FF; --blue-tint:#F2F6FF;
    --purple:#7C4DFF; --purple-deep:#5E2EE0; --purple-soft:#F1ECFF;
    --coral:#F0506E; --green:#1FB57A;
    --shadow-sm:0 1px 2px rgba(16,26,61,.05), 0 1px 3px rgba(16,26,61,.04);
    --shadow-md:0 4px 16px rgba(16,26,61,.07), 0 1px 4px rgba(16,26,61,.04);
    --shadow-lg:0 18px 50px rgba(16,26,61,.16);
    --shadow-purple:0 0 0 1px rgba(124,77,255,.35), 0 8px 30px rgba(124,77,255,.22);
    --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px;
    --display:"Space Grotesk","Inter",system-ui,sans-serif;
    --body:"Inter",system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Consolas,monospace;
  }
  :root[data-theme="dark"]{
    --bg:#0B1020; --surface:#141B30; --surface-2:#1B2238;
    --ink:#E8EDFA; --ink-soft:#9BA8CC; --ink-faint:#69769C;
    --line:#28324F; --line-strong:#36426B;
    --blue:#4D74FF; --blue-deep:#3B5FE0; --blue-soft:#1C2747; --blue-tint:#172036;
    --purple:#9B72FF; --purple-deep:#C4ABFF; --purple-soft:#241D45;
    --coral:#FF6B85; --green:#34D399;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4);
    --shadow-md:0 4px 18px rgba(0,0,0,.45), 0 1px 4px rgba(0,0,0,.3);
    --shadow-lg:0 22px 55px rgba(0,0,0,.6);
    --shadow-purple:0 0 0 1px rgba(155,114,255,.5), 0 10px 34px rgba(124,77,255,.32);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--body);background:var(--bg);color:var(--ink);line-height:1.5;min-height:100vh;
    -webkit-font-smoothing:antialiased;transition:background-color .3s,color .3s;
    background-image:
      radial-gradient(1200px 600px at 85% -10%, rgba(124,77,255,.06), transparent 60%),
      radial-gradient(1000px 500px at 0% 0%, rgba(47,91,234,.06), transparent 55%);
  }
  :root[data-theme="dark"] body{background-image:
      radial-gradient(1200px 600px at 85% -10%, rgba(124,77,255,.13), transparent 60%),
      radial-gradient(1000px 500px at 0% 0%, rgba(47,91,234,.12), transparent 55%);}
  ::selection{background:var(--blue-soft);color:var(--blue-deep)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
  input:focus-visible,select:focus-visible,textarea:focus-visible,button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}
  .wrap{max-width:1080px;margin:0 auto;padding:32px 24px 80px}

  /* Top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .mark{width:42px;height:42px;border-radius:12px;flex:none;background:linear-gradient(140deg,var(--blue) 0%,var(--blue-deep) 60%,var(--purple) 130%);display:grid;place-items:center;box-shadow:0 6px 18px rgba(47,91,234,.32);position:relative}
  .mark::before{content:"";position:absolute;inset:0;border-radius:12px;border:1px solid rgba(255,255,255,.25)}
  .mark svg{width:22px;height:22px}
  .brand-text h1{font-family:var(--display);font-size:19px;font-weight:600;letter-spacing:-.01em;line-height:1.1}
  .brand-text p{font-size:12.5px;color:var(--ink-soft);margin-top:1px}
  .top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink-soft);background:var(--surface);border:1px solid var(--line);padding:8px 13px;border-radius:999px;box-shadow:var(--shadow-sm);transition:.18s}
  .pill:hover{border-color:var(--line-strong);color:var(--ink);background:var(--surface-2)}
  .pill svg{width:15px;height:15px}
  .notif-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint)}
  .notif-pill.on .dot{background:var(--green);box-shadow:0 0 0 3px rgba(31,181,122,.18)}
  .notif-pill.off .dot{background:var(--coral)}

  /* Hero */
  .hero{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);box-shadow:var(--shadow-md);padding:30px 34px;margin-bottom:24px;display:grid;grid-template-columns:1fr auto;gap:32px;align-items:center;position:relative;overflow:hidden;transition:background-color .3s,border-color .3s}
  .hero::after{content:"";position:absolute;right:-80px;top:-80px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(124,77,255,.10),transparent 70%);pointer-events:none}
  .clock-block{min-width:0}
  .clock-eyebrow{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:8px}
  .clock{font-family:var(--mono);font-size:clamp(44px,8vw,72px);font-weight:500;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
  .clock .sec{color:var(--blue);font-weight:400}
  .clock-date{font-size:14.5px;color:var(--ink-soft);margin-top:10px;font-weight:500}
  .next-block{border-left:1px solid var(--line);padding-left:32px;min-width:240px;display:flex;flex-direction:column;gap:4px;position:relative;z-index:1}
  .next-label{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
  .next-count{font-family:var(--mono);font-size:30px;font-weight:500;letter-spacing:-.01em;font-variant-numeric:tabular-nums;color:var(--ink)}
  .next-count.imminent{color:var(--purple-deep)}
  .next-title{font-size:14px;color:var(--ink-soft);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .next-empty{font-size:14px;color:var(--ink-faint);margin-top:6px}

  /* Composer */
  .composer{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:8px;margin-bottom:20px;display:flex;align-items:center;gap:8px;transition:box-shadow .2s,border-color .2s,background-color .3s}
  .composer:focus-within{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-soft)}
  .composer .quick-in{flex:1;border:none;background:transparent;padding:12px 14px;font-size:16px;font-weight:500}
  .composer .quick-in::placeholder{color:var(--ink-faint);font-weight:400}
  .composer .quick-in:focus-visible{outline:none}
  .composer .quick-time{border:1px solid var(--line);background:var(--surface-2);border-radius:var(--r-sm);padding:10px 12px;font-family:var(--mono);font-size:13.5px;color:var(--ink-soft);width:184px}
  .btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:14.5px;padding:11px 18px;border-radius:var(--r-sm);transition:.16s;white-space:nowrap}
  .btn-primary{background:var(--blue);color:#fff;box-shadow:0 4px 12px rgba(47,91,234,.28)}
  .btn-primary:hover{background:var(--blue-deep);transform:translateY(-1px);box-shadow:0 6px 16px rgba(47,91,234,.34)}
  .btn-primary:active{transform:translateY(0)}
  .btn-ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink-soft)}
  .btn-ghost:hover{border-color:var(--line-strong);color:var(--ink);background:var(--surface-2)}

  /* Toolbar */
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px;flex-wrap:wrap}
  .filters{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);padding:4px;border-radius:999px;box-shadow:var(--shadow-sm)}
  .filters button{font-size:13.5px;font-weight:600;color:var(--ink-soft);padding:7px 15px;border-radius:999px;transition:.16s;display:inline-flex;align-items:center;gap:6px}
  .filters button:hover{color:var(--ink)}
  .filters button.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(47,91,234,.28)}
  .filters .badge{font-family:var(--mono);font-size:11px;background:rgba(16,26,61,.07);padding:1px 6px;border-radius:6px;font-weight:500}
  :root[data-theme="dark"] .filters .badge{background:rgba(255,255,255,.09)}
  .filters button.active .badge{background:rgba(255,255,255,.22)}
  .tool-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .sortsel{position:relative;display:flex;align-items:center}
  .sortsel svg{position:absolute;left:11px;width:15px;height:15px;color:var(--ink-faint);pointer-events:none}
  .sortsel select{appearance:none;border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:9px 30px 9px 32px;box-shadow:var(--shadow-sm);font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.18s}
  .sortsel select:hover{border-color:var(--line-strong);color:var(--ink)}
  .sortsel::after{content:"";position:absolute;right:13px;width:7px;height:7px;border-right:2px solid var(--ink-faint);border-bottom:2px solid var(--ink-faint);transform:rotate(45deg) translateY(-2px);pointer-events:none}
  .search{position:relative;display:flex;align-items:center}
  .search svg{position:absolute;left:12px;width:16px;height:16px;color:var(--ink-faint);pointer-events:none}
  .search input{border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:9px 14px 9px 34px;width:200px;box-shadow:var(--shadow-sm);transition:.18s;font-size:14px}
  .search input:focus-visible{border-color:var(--blue);outline:none;box-shadow:0 0 0 4px var(--blue-soft)}

  /* Tag filter bar */
  .tagbar{display:flex;align-items:center;gap:8px;margin-bottom:22px;flex-wrap:wrap}
  .tagbar.hidden{display:none}
  .tagbar .tb-label{font-size:12px;font-weight:600;color:var(--ink-faint);letter-spacing:.04em;margin-right:2px}
  .tf{font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);transition:.14s;display:inline-flex;align-items:center;gap:6px}
  .tf:hover{border-color:var(--line-strong);color:var(--ink)}
  .tf .tdot{width:7px;height:7px;border-radius:50%}
  .tf.active{border-color:transparent;color:#fff;background:var(--blue)}
  .tf.active .tdot{background:rgba(255,255,255,.85)}
  .tf.all.active{background:var(--ink);color:var(--surface)}
  .tf.all.active .tdot{background:var(--surface)}
  .tmatch{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin-left:2px}
  .tmatch button{font-size:11.5px;font-weight:600;padding:5px 11px;color:var(--ink-soft);transition:.14s}
  .tmatch button:hover{color:var(--ink)}
  .tmatch button.on{background:var(--purple);color:#fff}

  /* Groups & cards */
  .group{margin-bottom:26px}
  .group-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:0 4px}
  .group-head .gdot{width:9px;height:9px;border-radius:50%;flex:none}
  .group-head h2{font-family:var(--display);font-size:15px;font-weight:600;letter-spacing:.01em}
  .group-head .count{font-family:var(--mono);font-size:12px;color:var(--ink-faint);font-weight:500}
  .group-head .rule{flex:1;height:1px;background:var(--line)}
  .group-head .hint{font-size:12px;color:var(--ink-faint);font-weight:500}
  .group[data-group="overdue"] h2{color:var(--purple-deep)}
  .list{display:flex;flex-direction:column;gap:10px}

  .task{--accent:var(--blue);background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--shadow-sm);padding:16px 18px 16px 20px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;position:relative;overflow:hidden;transition:box-shadow .2s,border-color .2s,transform .12s,background-color .3s}
  .task.has-handle{grid-template-columns:auto auto 1fr auto;gap:12px}
  .task::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);border-radius:4px 0 0 4px}
  .task:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .task.imminent{border-color:rgba(124,77,255,.45);box-shadow:var(--shadow-purple)}
  .task.imminent::before{background:var(--purple)}
  .task.is-overdue{border-color:rgba(124,77,255,.5)}
  .task.is-overdue::before{background:var(--purple)}
  .task.done{opacity:.6}
  .task.done .t-title{text-decoration:line-through;color:var(--ink-soft)}
  .task.dragging{opacity:.45;box-shadow:var(--shadow-lg);transform:none}
  .task.drop-before{box-shadow:inset 0 3px 0 0 var(--blue)}
  .task.drop-after{box-shadow:inset 0 -3px 0 0 var(--blue)}

  .drag-handle{width:24px;height:34px;display:none;place-items:center;color:var(--ink-faint);cursor:grab;border-radius:8px;flex:none;touch-action:none}
  .has-handle .drag-handle{display:grid}
  .drag-handle:hover{color:var(--blue);background:var(--blue-soft)}
  .drag-handle:active{cursor:grabbing}
  .drag-handle svg{width:16px;height:16px}

  .check{width:24px;height:24px;border-radius:50%;border:2px solid var(--line-strong);flex:none;display:grid;place-items:center;transition:.16s;color:#fff}
  .check:hover{border-color:var(--blue)}
  .check svg{width:13px;height:13px;opacity:0;transform:scale(.5);transition:.16s}
  .task.done .check{background:var(--green);border-color:var(--green)}
  .task.done .check svg{opacity:1;transform:scale(1)}

  .t-main{min-width:0}
  .t-title{font-size:15.5px;font-weight:600;letter-spacing:-.005em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .t-meta{display:flex;align-items:center;gap:10px;margin-top:5px;flex-wrap:wrap}
  .t-time{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);font-weight:500;display:inline-flex;align-items:center;gap:5px}
  .t-time svg{width:13px;height:13px;color:var(--ink-faint)}
  .t-rel{font-size:12px;font-weight:600;padding:2px 8px;border-radius:6px;background:var(--blue-tint);color:var(--blue-deep)}
  :root[data-theme="dark"] .t-rel{background:rgba(77,116,255,.16);color:#A8BCFF}
  .t-rel.soon{background:var(--purple-soft);color:var(--purple-deep)}
  .t-rel.over{background:#FDECEF;color:var(--coral)}
  :root[data-theme="dark"] .t-rel.over{background:rgba(255,107,133,.16)}
  .t-prio{font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:5px;color:var(--ink-soft)}
  .t-prio .pd{width:7px;height:7px;border-radius:50%}
  .prio-high .pd{background:var(--coral)} .prio-medium .pd{background:var(--blue)} .prio-low .pd{background:var(--ink-faint)}
  .t-repeat{font-size:11.5px;color:var(--ink-faint);display:inline-flex;align-items:center;gap:4px}
  .t-repeat svg{width:12px;height:12px}
  .t-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .chip{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;line-height:1.3;letter-spacing:.01em}
  .t-note{font-size:13px;color:var(--ink-soft);margin-top:8px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  .t-actions{display:flex;align-items:center;gap:4px;opacity:0;transition:.16s}
  .task:hover .t-actions,.task:focus-within .t-actions{opacity:1}
  .icon-btn{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--ink-faint);transition:.14s}
  .icon-btn:hover{background:var(--blue-soft);color:var(--blue-deep)}
  .icon-btn.danger:hover{background:#FDECEF;color:var(--coral)}
  :root[data-theme="dark"] .icon-btn.danger:hover{background:rgba(255,107,133,.16)}
  .icon-btn svg{width:16px;height:16px}

  /* Empty */
  .empty{text-align:center;padding:64px 24px;background:var(--surface);border:1px dashed var(--line-strong);border-radius:var(--r-lg)}
  .empty .ico{width:64px;height:64px;margin:0 auto 18px;border-radius:18px;background:var(--blue-tint);display:grid;place-items:center;color:var(--blue)}
  .empty .ico svg{width:30px;height:30px}
  .empty h3{font-family:var(--display);font-size:18px;font-weight:600;margin-bottom:6px}
  .empty p{color:var(--ink-soft);font-size:14.5px;max-width:340px;margin:0 auto}

  /* Modal */
  .scrim{position:fixed;inset:0;background:rgba(16,26,61,.42);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:48px 20px;z-index:50;overflow-y:auto}
  :root[data-theme="dark"] .scrim{background:rgba(0,0,0,.6)}
  .scrim.show{display:flex;animation:fade .18s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);width:100%;max-width:520px;animation:rise .22s cubic-bezier(.2,.8,.25,1);margin:auto 0}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  .modal-head{padding:24px 26px 0;display:flex;align-items:center;justify-content:space-between}
  .modal-head h3{font-family:var(--display);font-size:19px;font-weight:600}
  .modal-body{padding:20px 26px 26px;display:flex;flex-direction:column;gap:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:7px}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:var(--surface-2);border-radius:var(--r-sm);padding:12px 14px;transition:.16s}
  .field input:focus-visible,.field select:focus-visible,.field textarea:focus-visible{border-color:var(--blue);background:var(--surface);outline:none;box-shadow:0 0 0 4px var(--blue-soft)}
  .field textarea{resize:vertical;min-height:72px;line-height:1.5}
  .field .mono{font-family:var(--mono)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .prio-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .prio-pick label{display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line);background:var(--surface-2);border-radius:var(--r-sm);padding:11px;font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.14s;margin:0}
  .prio-pick input{position:absolute;opacity:0;width:0;height:0}
  .prio-pick label .pd{width:8px;height:8px;border-radius:50%}
  .prio-pick label:hover{border-color:var(--line-strong)}
  .prio-pick input:checked+label{border-color:var(--blue);background:var(--blue-soft);color:var(--blue-deep);box-shadow:0 0 0 1px var(--blue)}
  :root[data-theme="dark"] .prio-pick input:checked+label{color:#A8BCFF}
  .prio-pick input:focus-visible+label{outline:2px solid var(--blue);outline-offset:2px}
  .tags-input{display:flex;flex-wrap:wrap;gap:6px;align-items:center;border:1px solid var(--line);background:var(--surface-2);border-radius:var(--r-sm);padding:8px 10px;transition:.16s;cursor:text}
  .tags-input.focus{border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 4px var(--blue-soft)}
  .tags-input .chip{display:inline-flex;align-items:center;gap:5px}
  .tags-input .chip button{width:14px;height:14px;border-radius:50%;display:grid;place-items:center;opacity:.6;transition:.12s}
  .tags-input .chip button:hover{opacity:1;background:rgba(0,0,0,.08)}
  :root[data-theme="dark"] .tags-input .chip button:hover{background:rgba(255,255,255,.14)}
  .tags-input .chip button svg{width:9px;height:9px}
  .tags-input input{flex:1;min-width:90px;border:none;background:transparent;padding:4px 2px;font-size:14px}
  .tags-input input:focus-visible{outline:none}
  .tags-hint{font-size:11.5px;color:var(--ink-faint);margin-top:6px}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:6px}

  /* Import dialog */
  .imp-summary{font-size:13.5px;color:var(--ink-soft);line-height:1.6;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px}
  .imp-summary b{color:var(--ink);font-weight:700}
  .imp-choice{display:flex;flex-direction:column;gap:10px}

  /* Alarm */

  @keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
  .bell{width:78px;height:78px;margin:0 auto 22px;border-radius:50%;display:grid;place-items:center;color:#fff;background:linear-gradient(140deg,var(--blue),var(--purple));box-shadow:0 12px 34px rgba(124,77,255,.4);animation:ring 1s ease-in-out infinite}

  @keyframes ring{0%,100%{transform:rotate(0)}15%{transform:rotate(12deg)}30%{transform:rotate(-10deg)}45%{transform:rotate(8deg)}60%{transform:rotate(-6deg)}75%{transform:rotate(3deg)}}
  .alarm-card .ae{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--purple-deep);margin-bottom:8px}

  .alarm-card .an{font-size:14px;color:var(--ink-soft);margin-top:10px;line-height:1.5}
  .alarm-foot{display:flex;flex-direction:column;gap:10px;margin-top:26px}
  .snooze-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .snooze-row button{border:1px solid var(--line);background:var(--surface-2);border-radius:var(--r-sm);padding:11px;font-weight:600;font-size:13.5px;color:var(--ink-soft);transition:.14s}
  .snooze-row button:hover{border-color:var(--purple);color:var(--purple-deep);background:var(--purple-soft)}
  .btn-block{width:100%;justify-content:center;padding:13px}

  /* Toast */
  .toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:var(--ink);color:var(--surface);padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;animation:toastIn .26s cubic-bezier(.2,.8,.3,1)}
  :root[data-theme="dark"] .toast{background:#222C49;color:var(--ink);border:1px solid var(--line)}
  .toast svg{width:15px;height:15px;color:var(--green)}
  .toast.warn svg{color:var(--coral)}
  .toast .undo{color:#7FA0FF;font-weight:600;cursor:pointer;margin-left:4px}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  .foot-hint{text-align:center;font-size:12.5px;color:var(--ink-faint);margin-top:40px;line-height:1.7}
  .foot-hint kbd{font-family:var(--mono);font-size:11px;background:var(--surface);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--ink-soft)}

  @media (max-width:760px){
    .wrap{padding:22px 16px 70px}
    .hero{grid-template-columns:1fr;gap:22px;padding:24px}
    .next-block{border-left:none;border-top:1px solid var(--line);padding-left:0;padding-top:20px;min-width:0}
    .composer{flex-wrap:wrap}.composer .quick-time{width:100%}.composer .btn-primary{width:100%;justify-content:center}

    .row2{grid-template-columns:1fr}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.05ms!important}}
</style>

<script>
(function(){
  "use strict";
  const KEY="shiketai.tasks.v1", THEME_KEY="shiketai.theme";
  const $=(s,el=document)=>el.querySelector(s);
  const $$=(s,el=document)=>[...el.querySelectorAll(s)];

  let tasks=load();
  let filter="all", search="", sortMode="time";
  let tagFilters=new Set(), tagMatch="any";
  let editingId=null, activeAlarm=null;
  let audioCtx=null, alarmOsc=null, modalTags=[], pendingImport=null;

  /* storage + migration */
  function load(){let r=[];try{const p=JSON.parse(localStorage.getItem(KEY));if(Array.isArray(p))r=p;}catch(e){}return r.map(normalize);}
  function save(){localStorage.setItem(KEY,JSON.stringify(tasks));}
  function normalize(t){t=t||{};return{
    id:t.id||uid(),
    title:String(t.title||"").slice(0,200),
    time:Number(t.time)||Date.now(),
    priority:["high","medium","low"].includes(t.priority)?t.priority:"medium",
    repeat:["none","daily","weekdays","weekly"].includes(t.repeat)?t.repeat:"none",
    note:String(t.note||""),
    tags:Array.isArray(t.tags)?t.tags.filter(x=>typeof x==="string").map(x=>x.trim()).filter(Boolean).slice(0,8):[],
    done:!!t.done, fired:!!t.fired
  };}

  /* helpers */
  const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  const pad=n=>String(n).padStart(2,"0");
  const WD=["周日","周一","周二","周三","周四","周五","周六"];
  function ymd(){const d=new Date();return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());}
  function toLocalInput(d){const x=new Date(d);return x.getFullYear()+"-"+pad(x.getMonth()+1)+"-"+pad(x.getDate())+"T"+pad(x.getHours())+":"+pad(x.getMinutes());}
  function fmtTime(ts){const d=new Date(ts),now=new Date(),t=pad(d.getHours())+":"+pad(d.getMinutes());if(d.toDateString()===now.toDateString())return "今天 "+t;const tmr=new Date(now);tmr.setDate(now.getDate()+1);if(d.toDateString()===tmr.toDateString())return "明天 "+t;const sy=d.getFullYear()===now.getFullYear();return (sy?"":d.getFullYear()+"/")+pad(d.getMonth()+1)+"/"+pad(d.getDate())+" "+WD[d.getDay()]+" "+t;}
  function relText(ts){const diff=ts-Date.now(),past=diff<0,a=Math.abs(diff),m=Math.round(a/60000);let s;if(m<1)s="刚刚";else if(m<60)s=m+" 分钟";else if(m<1440)s=Math.floor(m/60)+" 小时"+(m%60?" "+(m%60)+" 分":"");else s=Math.floor(m/1440)+" 天";return past?"逾期 "+s:(m<1?"马上":s+"后");}
  function dur(ms){if(ms<0)ms=0;const s=Math.floor(ms/1000),dd=Math.floor(s/86400),hh=Math.floor(s%86400/3600),mm=Math.floor(s%3600/60),ss=s%60;return dd>0?dd+"天 "+pad(hh)+":"+pad(mm)+":"+pad(ss):pad(hh)+":"+pad(mm)+":"+pad(ss);}
  function statusOf(t){if(t.done)return "done";const diff=t.time-Date.now();if(diff<0)return "overdue";const d=new Date(t.time),now=new Date();return d.toDateString()===now.toDateString()?"today":"upcoming";}
  function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}

  /* theme-aware tag colors */
  const TAG_HUES=[{h:222,s:70},{h:262,s:75},{h:162,s:52},{h:30,s:78},{h:340,s:64},{h:240,s:52},{h:202,s:68},{h:225,s:16}];
  function isDark(){return document.documentElement.getAttribute("data-theme")==="dark";}
  function tagColor(name){
    let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;
    const b=TAG_HUES[h%TAG_HUES.length];
    const solid=`hsl(${b.h} ${b.s}% 52%)`;
    if(isDark())return{bg:`hsla(${b.h},${b.s}%,58%,.18)`,fg:`hsl(${b.h} ${Math.min(b.s+18,88)}% 74%)`,solid};
    return{bg:`hsl(${b.h} ${b.s}% 95%)`,fg:`hsl(${b.h} ${Math.min(b.s+6,82)}% 35%)`,solid};
  }
  function allTags(){const m=new Map();tasks.forEach(t=>t.tags.forEach(g=>m.set(g,(m.get(g)||0)+1)));return [...m.entries()].sort((a,b)=>b[1]-a[1]).map(e=>e[0]);}
  const PRIO_ORDER={high:0,medium:1,low:2};

  /* visible */
  function visibleTasks(){
    let arr=tasks.slice();
    if(search){const q=search.toLowerCase();arr=arr.filter(t=>t.title.toLowerCase().includes(q)||(t.note||"").toLowerCase().includes(q)||t.tags.some(g=>g.toLowerCase().includes(q)));}
    if(tagFilters.size){const sel=[...tagFilters];arr=arr.filter(t=>tagMatch==="all"?sel.every(g=>t.tags.includes(g)):sel.some(g=>t.tags.includes(g)));}
    if(filter!=="all")arr=arr.filter(t=>statusOf(t)===filter);
    return arr;
  }

  /* render */
  function render(){
    updateCounts();renderTagbar();
    const board=$("#board"),arr=visibleTasks();
    if(arr.length===0){board.innerHTML=emptyState();return;}

    if(sortMode==="manual"){
      board.innerHTML=`<section class="group" data-group="manual"><div class="group-head"><h2>手动排序</h2><span class="count">${arr.length}</span><span class="rule"></span><span class="hint">拖动手柄或用 ↑ ↓ 调整</span></div><div class="list">${arr.map(t=>taskRow(t,true)).join("")}</div></section>`;
      return;
    }

    if(sortMode==="tag"){
      const order=allTags(),buckets=new Map();order.forEach(g=>buckets.set(g,[]));let untag=[];
      arr.forEach(t=>{if(t.tags.length===0)untag.push(t);else t.tags.forEach(g=>{if(!buckets.has(g))buckets.set(g,[]);buckets.get(g).push(t);});});
      let groups=[];
      order.forEach(g=>{if(tagFilters.size&&!tagFilters.has(g))return;const items=buckets.get(g)||[];if(items.length)groups.push([g,items]);});
      if(!tagFilters.size&&untag.length)groups.push(["__untag__",untag]);
      const html=groups.map(([g,items])=>{
        items=items.slice().sort((a,b)=>a.time-b.time);
        const un=g==="__untag__",c=un?null:tagColor(g);
        const dot=`<span class="gdot" style="background:${un?'var(--ink-faint)':c.fg}"></span>`;
        return `<section class="group"><div class="group-head">${dot}<h2>${un?'未分类':esc(g)}</h2><span class="count">${items.length}</span><span class="rule"></span></div><div class="list">${items.map(t=>taskRow(t,false)).join("")}</div></section>`;
      }).join("");
      board.innerHTML=html||emptyState();
      return;
    }

  function taskRow(t,draggable){

          ${t.done?`<span class="t-rel">已完成</span>`:`<span class="t-rel ${relCls}">${relText(t.time)}</span>`}
          <span class="t-prio prio-${t.priority}"><span class="pd"></span>${({high:'重要',medium:'一般',low:'次要'})[t.priority]}</span>
          ${repeatLabel?`<span class="t-repeat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>${repeatLabel}</span>`:""}

        <button class="icon-btn danger" data-act="del" aria-label="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
      </div>

  /* alarm */

  /* sound */
  function ensureAudio(){if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx;}
  function startSound(){const ctx=ensureAudio();if(!ctx)return;stopSound();const master=ctx.createGain();master.gain.value=0.0001;master.connect(ctx.destination);const o1=ctx.createOscillator(),o2=ctx.createOscillator();o1.type="sine";o2.type="sine";o1.frequency.value=880;o2.frequency.value=660;o1.connect(master);o2.connect(master);o1.start();o2.start();const t0=ctx.currentTime;for(let i=0;i<240;i++){const tt=t0+i*0.6;master.gain.setValueAtTime(0.0001,tt);master.gain.exponentialRampToValueAtTime(0.16,tt+0.05);master.gain.exponentialRampToValueAtTime(0.0001,tt+0.4);}alarmOsc={o1,o2,master};}
  function stopSound(){if(alarmOsc){try{alarmOsc.o1.stop();alarmOsc.o2.stop();}catch(e){}alarmOsc=null;}}

  /* notification */
  function refreshNotifUI(){const btn=$("#notifBtn"),txt=$("#notifText");if(!("Notification" in window)){btn.style.display="none";return;}const p=Notification.permission;btn.classList.toggle("on",p==="granted");btn.classList.toggle("off",p!=="granted");txt.textContent=p==="granted"?"系统通知已开启":(p==="denied"?"通知被浏览器拦截":"开启系统通知");}

  /* toast */
  function toast(msg,undo,warn){const wrap=$("#toastWrap"),el=document.createElement("div");el.className="toast"+(warn?" warn":"");const icon=warn?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 8v5M12 16h.01"/><circle cx="12" cy="12" r="9"/></svg>`:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`;el.innerHTML=icon+esc(msg);if(undo){const u=document.createElement("span");u.className="undo";u.textContent="撤销";u.onclick=()=>{undo();el.remove();};el.appendChild(u);}wrap.appendChild(el);setTimeout(()=>{el.style.opacity="0";el.style.transform="translateY(8px)";setTimeout(()=>el.remove(),200);},undo?5000:2400);}

  function openModal(id){editingId=id||null;const t=id?tasks.find(x=>x.id===id):null;$("#modalTitle").textContent=t?"编辑事务":"新建事务";$("#mTitle").value=t?t.title:"";$("#mTime").value=toLocalInput(t?t.time:roundedSoon());$("#mRepeat").value=t?t.repeat:"none";$("#mNote").value=t?(t.note||""):"";const prio=t?t.priority:"medium",r=document.querySelector(`input[name=prio][value="${prio}"]`);if(r)r.checked=true;modalTags=t?t.tags.slice():[];refreshTagSuggest();renderModalTags();$("#mTagInput").value="";$("#scrim").classList.add("show");setTimeout(()=>$("#mTitle").focus(),60);}

  function exportJSON(){const data={app:"shiketai",version:1,exportedAt:new Date().toISOString(),tasks};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="时刻台备份-"+ymd()+".json";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);toast("已导出 "+tasks.length+" 条事务");}
  function importJSON(file){const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);const incoming=Array.isArray(data)?data:(data&&Array.isArray(data.tasks)?data.tasks:null);if(!incoming)throw 0;const norm=incoming.filter(it=>it&&it.title).map(normalize);if(norm.length===0){toast("备份中没有可导入的事务",null,true);return;}pendingImport=norm;openImportDialog(norm);}catch(e){toast("导入失败：文件不是有效的备份",null,true);}};r.onerror=()=>toast("无法读取文件",null,true);r.readAsText(file);}

  $("#importScrim").addEventListener("click",e=>{if(e.target===$("#importScrim"))closeImportDialog();});

  $("#alarmDone").addEventListener("click",alarmComplete);
  $$(".snooze-row button").forEach(b=>b.addEventListener("click",()=>alarmSnooze(+b.dataset.snooze)));

  $("#themeBtn").addEventListener("click",toggleTheme);
  $("#notifBtn").addEventListener("click",()=>{ensureAudio();if(!("Notification" in window))return;if(Notification.permission==="granted"){toast("系统通知已开启");return;}if(Notification.permission==="denied"){toast("请在浏览器地址栏处允许通知",null,true);return;}Notification.requestPermission().then(()=>{refreshNotifUI();if(Notification.permission==="granted")toast("系统通知已开启");});});
  $("#exportBtn").addEventListener("click",exportJSON);
  $("#importBtn").addEventListener("click",()=>$("#importFile").click());
  $("#importFile").addEventListener("change",e=>{const f=e.target.files&&e.target.files[0];if(f)importJSON(f);e.target.value="";});

  document.addEventListener("keydown",e=>{const typing=/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);if(e.key==="Escape"&&!$("#alarm").classList.contains("show")){if($("#importScrim").classList.contains("show"))closeImportDialog();else if($("#scrim").classList.contains("show"))closeModal();}if(typing)return;if(e.key==="n"||e.key==="N"){e.preventDefault();openModal();}if(e.key==="/"){e.preventDefault();$("#searchIn").focus();}});
  document.addEventListener("click",function once(){ensureAudio();document.removeEventListener("click",once);},{once:true});

  /* seed */
  if(tasks.length===0&&!localStorage.getItem("shiketai.seeded")){const now=Date.now();tasks=[normalize({title:"提交季度财务报告",time:now+45*60000,priority:"high",repeat:"none",note:"发给财务部张总，附上 Q2 对比图。",tags:["工作","财务"]}),normalize({title:"团队周会",time:now+3*3600000,priority:"medium",repeat:"weekly",note:"会议室 B / 同步本周进度。",tags:["工作","会议"]}),normalize({title:"吃药提醒",time:now+24*3600000,priority:"low",repeat:"daily",note:"",tags:["健康"]})];save();localStorage.setItem("shiketai.seeded","1");}

  /* boot */
  updateThemeBtn();refreshNotifUI();render();tick();
  setInterval(tick,1000);
  setInterval(()=>{if(!dragId)render();},60000);
  document.addEventListener("visibilitychange",()=>{if(!document.hidden)tick();});
  $("#quickTime").value="";
})();
</script>
</body>
</html>
